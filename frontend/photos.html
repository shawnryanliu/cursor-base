<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>相册 - MiniMax Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #212121;
      color: #ececec;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      background: #171717;
      display: flex;
      flex-direction: column;
      padding: 16px 10px;
      flex-shrink: 0;
    }
    .sidebar-brand {
      font-size: 0.85rem;
      font-weight: 600;
      color: #8e8ea0;
      letter-spacing: 0.05em;
      padding: 4px 10px 16px;
    }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 8px;
      color: #8e8ea0;
      font-size: 0.875rem;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
    }
    .nav-link:hover { background: #2a2a2a; color: #ececec; }
    .nav-link.active { background: #2a2a2a; color: #ececec; }

    /* ── Main ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 28px 16px;
      flex-shrink: 0;
    }
    .toolbar h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #ececec;
    }
    .toolbar-right { display: flex; gap: 10px; align-items: center; }

    .upload-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 9px 18px;
      background: #19c37d;
      border: none;
      border-radius: 20px;
      color: #fff;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }
    .upload-btn:hover { background: #15a367; }
    .upload-btn:disabled { background: #3a3a3a; cursor: not-allowed; opacity: 0.6; }

    /* ── Drop zone overlay ── */
    .drop-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(25, 195, 125, 0.12);
      border: 3px dashed #19c37d;
      z-index: 50;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: #19c37d;
      font-weight: 600;
      pointer-events: none;
    }
    .drop-overlay.visible { display: flex; }

    /* ── Scroll container ── */
    .scroll-area {
      flex: 1;
      overflow-y: auto;
      padding: 0 20px 40px;
    }
    .scroll-area::-webkit-scrollbar { width: 6px; }
    .scroll-area::-webkit-scrollbar-track { background: transparent; }
    .scroll-area::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }

    /* ── Masonry grid (Pinterest style) ── */
    .masonry-grid {
      columns: 4 220px;
      column-gap: 14px;
    }

    /* ── Photo card ── */
    .photo-card {
      break-inside: avoid;
      margin-bottom: 14px;
      background: #2a2a2a;
      border-radius: 16px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .photo-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .card-img {
      width: 100%;
      display: block;
      height: auto;
      background: #1a1a1a;
    }

    /* hover overlay */
    .card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(0,0,0,0.5) 0%, transparent 40%, transparent 60%, rgba(0,0,0,0.6) 100%);
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 10px;
    }
    .photo-card:hover .card-overlay { opacity: 1; }

    .overlay-top {
      display: flex;
      justify-content: flex-end;
      gap: 6px;
    }
    .action-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      transition: transform 0.15s;
    }
    .action-btn:hover { transform: scale(1.1); }
    .btn-download { background: #fff; color: #212121; }
    .btn-delete { background: #e55; color: #fff; }

    /* card body: description */
    .card-body {
      padding: 10px 12px 12px;
    }
    .description-text {
      font-size: 0.82rem;
      color: #aaa;
      line-height: 1.4;
      cursor: text;
      min-height: 20px;
      word-break: break-word;
    }
    .description-text.empty { color: #555; font-style: italic; }
    .description-edit {
      display: none;
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #19c37d;
      border-radius: 6px;
      color: #ececec;
      font-size: 0.82rem;
      padding: 6px 8px;
      resize: none;
      outline: none;
      font-family: inherit;
      line-height: 1.4;
    }
    .card-date {
      font-size: 0.72rem;
      color: #555;
      margin-top: 6px;
    }

    /* ── Empty state ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 50vh;
      gap: 12px;
      color: #555;
    }
    .empty-state svg { opacity: 0.3; }
    .empty-state p { font-size: 0.95rem; }

    /* ── Upload progress toast ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 12px;
      padding: 12px 18px;
      font-size: 0.85rem;
      color: #ececec;
      display: none;
      align-items: center;
      gap: 10px;
      z-index: 200;
      min-width: 200px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .toast.visible { display: flex; }
    .toast-spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #3a3a3a;
      border-top-color: #19c37d;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Lightbox ── */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    .lightbox.open { display: flex; }
    .lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      border-radius: 8px;
      object-fit: contain;
    }
    .lightbox-close {
      position: absolute;
      top: 20px;
      right: 24px;
      background: rgba(255,255,255,0.15);
      border: none;
      color: #fff;
      font-size: 1.2rem;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .lightbox-close:hover { background: rgba(255,255,255,0.25); }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-brand">MiniMax Chat</div>
    <a class="nav-link" href="/index.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
      聊天
    </a>
    <a class="nav-link active" href="/photos.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      相册
    </a>
  </div>

  <!-- Main -->
  <div class="main" id="main-area">
    <div class="toolbar">
      <h1>我的相册</h1>
      <div class="toolbar-right">
        <span id="photo-count" style="color:#555;font-size:0.85rem;"></span>
        <button class="upload-btn" id="upload-btn" onclick="document.getElementById('file-input').click()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          上传图片
        </button>
        <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handleFileInput(this)">
      </div>
    </div>

    <div class="scroll-area">
      <div class="masonry-grid" id="grid"></div>
      <div class="empty-state" id="empty-state" style="display:none">
        <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/>
          <circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>还没有照片，点击上传开始吧</p>
      </div>
    </div>
  </div>

  <!-- Drop overlay -->
  <div class="drop-overlay" id="drop-overlay">
    <span>松开鼠标上传图片</span>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast">
    <div class="toast-spinner"></div>
    <span id="toast-text">上传中...</span>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
    <button class="lightbox-close" onclick="document.getElementById('lightbox').classList.remove('open')">✕</button>
    <img id="lightbox-img" src="" alt="">
  </div>

  <script>
    const API = "";
    let photos = [];
    let uploadQueue = 0;

    // ── Init ────────────────────────────────────────────
    loadPhotos();

    async function loadPhotos() {
      try {
        const res = await fetch(`${API}/api/photos`);
        photos = await res.json();
        renderGrid();
      } catch {
        console.error("Failed to load photos");
      }
    }

    // ── Render ──────────────────────────────────────────
    function renderGrid() {
      const grid = document.getElementById("grid");
      const empty = document.getElementById("empty-state");
      const count = document.getElementById("photo-count");

      grid.innerHTML = "";
      count.textContent = photos.length > 0 ? `${photos.length} 张` : "";

      if (photos.length === 0) {
        empty.style.display = "flex";
        return;
      }
      empty.style.display = "none";
      photos.forEach((p) => grid.appendChild(createCard(p)));
    }

    function createCard(photo) {
      const card = document.createElement("div");
      card.className = "photo-card";
      card.dataset.id = photo.id;

      const desc = photo.description || "";
      const date = new Date(photo.created_at).toLocaleDateString("zh-CN", { month: "short", day: "numeric", year: "numeric" });

      card.innerHTML = `
        <img class="card-img" src="${photo.url}" alt="${escHtml(desc)}" loading="lazy" onclick="openLightbox('${photo.url}')">
        <div class="card-overlay">
          <div class="overlay-top">
            <button class="action-btn btn-download" title="下载" onclick="downloadPhoto(event,'${photo.url}','${photo.id}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
              </svg>
            </button>
            <button class="action-btn btn-delete" title="删除" onclick="deletePhoto(event,'${photo.id}')">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                <path d="M10 11v6"/><path d="M14 11v6"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="card-body">
          <p class="description-text ${desc ? "" : "empty"}" onclick="startEdit(this)">${desc ? escHtml(desc) : "添加描述..."}</p>
          <textarea class="description-edit" rows="2"
            onblur="saveDesc(this,'${photo.id}')"
            onkeydown="onDescKey(event,this,'${photo.id}')"
          >${escHtml(desc)}</textarea>
          <div class="card-date">${date}</div>
        </div>
      `;
      return card;
    }

    // ── Upload ──────────────────────────────────────────
    function handleFileInput(input) {
      const files = Array.from(input.files).filter((f) => f.type.startsWith("image/"));
      input.value = "";
      files.forEach(uploadPhoto);
    }

    async function uploadPhoto(file) {
      uploadQueue++;
      showToast(`上传中... (${uploadQueue} 张)`);
      document.getElementById("upload-btn").disabled = true;

      try {
        // Step 1: upload to COS
        const form = new FormData();
        form.append("file", file);
        const upRes = await fetch(`${API}/api/upload`, { method: "POST", body: form });
        if (!upRes.ok) throw new Error("Upload failed");
        const { url, key } = await upRes.json();

        // Step 2: save metadata
        const metaRes = await fetch(`${API}/api/photos`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ url, cosKey: key, description: "" }),
        });
        if (!metaRes.ok) throw new Error("Metadata save failed");
        const photo = await metaRes.json();

        photos.unshift(photo);
        const grid = document.getElementById("grid");
        const empty = document.getElementById("empty-state");
        empty.style.display = "none";
        grid.insertBefore(createCard(photo), grid.firstChild);
        document.getElementById("photo-count").textContent = `${photos.length} 张`;
      } catch (err) {
        console.error("Upload error:", err.message);
        alert("上传失败，请重试");
      } finally {
        uploadQueue--;
        if (uploadQueue === 0) {
          hideToast();
          document.getElementById("upload-btn").disabled = false;
        } else {
          showToast(`上传中... (${uploadQueue} 张)`);
        }
      }
    }

    // ── Delete ──────────────────────────────────────────
    async function deletePhoto(e, id) {
      e.stopPropagation();
      if (!confirm("确定删除这张照片？")) return;
      try {
        const res = await fetch(`${API}/api/photos/${id}`, { method: "DELETE" });
        if (!res.ok) throw new Error("Delete failed");
        photos = photos.filter((p) => p.id !== id);
        document.querySelector(`.photo-card[data-id="${id}"]`)?.remove();
        document.getElementById("photo-count").textContent = photos.length > 0 ? `${photos.length} 张` : "";
        if (photos.length === 0) document.getElementById("empty-state").style.display = "flex";
      } catch {
        alert("删除失败，请重试");
      }
    }

    // ── Download ─────────────────────────────────────────
    async function downloadPhoto(e, url, id) {
      e.stopPropagation();
      const a = document.createElement("a");
      a.href = url;
      a.download = `photo-${id}.jpg`;
      a.target = "_blank";
      a.click();
    }

    // ── Description edit ─────────────────────────────────
    function startEdit(textEl) {
      const body = textEl.closest(".card-body");
      const textarea = body.querySelector(".description-edit");
      textEl.style.display = "none";
      textarea.style.display = "block";
      textarea.focus();
      textarea.select();
    }

    function onDescKey(e, textarea, id) {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        saveDesc(textarea, id);
      }
      if (e.key === "Escape") {
        cancelEdit(textarea);
      }
    }

    let savingIds = new Set();
    async function saveDesc(textarea, id) {
      if (savingIds.has(id)) return;
      savingIds.add(id);

      const desc = textarea.value.trim();
      const body = textarea.closest(".card-body");
      const textEl = body.querySelector(".description-text");

      textarea.style.display = "none";
      textEl.style.display = "block";
      textEl.textContent = desc || "添加描述...";
      textEl.classList.toggle("empty", !desc);

      try {
        await fetch(`${API}/api/photos/${id}`, {
          method: "PUT",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ description: desc }),
        });
        const photo = photos.find((p) => p.id === id);
        if (photo) photo.description = desc;
      } catch {
        console.error("Failed to save description");
      } finally {
        savingIds.delete(id);
      }
    }

    function cancelEdit(textarea) {
      const body = textarea.closest(".card-body");
      const textEl = body.querySelector(".description-text");
      textarea.style.display = "none";
      textEl.style.display = "block";
    }

    // ── Lightbox ─────────────────────────────────────────
    function openLightbox(url) {
      document.getElementById("lightbox-img").src = url;
      document.getElementById("lightbox").classList.add("open");
    }

    function closeLightbox(e) {
      if (e.target === document.getElementById("lightbox")) {
        document.getElementById("lightbox").classList.remove("open");
      }
    }

    // ── Drag and drop ─────────────────────────────────────
    const mainArea = document.getElementById("main-area");
    const dropOverlay = document.getElementById("drop-overlay");
    let dragCounter = 0;

    mainArea.addEventListener("dragenter", (e) => {
      e.preventDefault();
      dragCounter++;
      dropOverlay.classList.add("visible");
    });
    mainArea.addEventListener("dragleave", () => {
      dragCounter--;
      if (dragCounter === 0) dropOverlay.classList.remove("visible");
    });
    mainArea.addEventListener("dragover", (e) => e.preventDefault());
    mainArea.addEventListener("drop", (e) => {
      e.preventDefault();
      dragCounter = 0;
      dropOverlay.classList.remove("visible");
      const files = [...e.dataTransfer.files].filter((f) => f.type.startsWith("image/"));
      files.forEach(uploadPhoto);
    });

    // ── Toast ─────────────────────────────────────────────
    function showToast(msg) {
      document.getElementById("toast-text").textContent = msg;
      document.getElementById("toast").classList.add("visible");
    }
    function hideToast() {
      document.getElementById("toast").classList.remove("visible");
    }

    // ── Utils ─────────────────────────────────────────────
    function escHtml(str) {
      return (str || "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  </script>
</body>
</html>
