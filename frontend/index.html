<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>MiniMax Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #212121;
      color: #ececec;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar */
    .sidebar {
      width: 260px;
      background: #171717;
      display: flex;
      flex-direction: column;
      padding: 12px 8px;
      flex-shrink: 0;
    }
    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 4px 8px 12px;
    }
    .sidebar-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #8e8ea0;
      letter-spacing: 0.05em;
    }
    .user-info {
      padding: 8px 10px;
      font-size: 0.78rem;
      color: #555;
      word-break: break-all;
    }
    .logout-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      width: 100%;
      padding: 8px 10px;
      background: none;
      border: none;
      color: #8e8ea0;
      font-size: 0.82rem;
      cursor: pointer;
      border-radius: 8px;
      text-align: left;
      margin-top: 4px;
      transition: background 0.15s, color 0.15s;
    }
    .logout-btn:hover { background: #2a2a2a; color: #e55; }
    .new-chat-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      background: none;
      border: none;
      color: #8e8ea0;
      transition: background 0.15s, color 0.15s;
    }
    .new-chat-btn:hover { background: #2a2a2a; color: #ececec; }

    .conv-list {
      flex: 1;
      overflow-y: auto;
      padding-bottom: 4px;
    }
    .conv-list::-webkit-scrollbar { width: 4px; }
    .conv-list::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    /* Group header */
    .conv-group { margin-bottom: 2px; }
    .conv-group-header {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 6px 10px 4px;
      cursor: pointer;
      user-select: none;
    }
    .conv-group-label {
      font-size: 0.72rem;
      font-weight: 600;
      color: #555;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      flex: 1;
    }
    .conv-group-arrow {
      color: #444;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .conv-group.collapsed .conv-group-arrow { transform: rotate(-90deg); }
    .conv-group-body { overflow: hidden; }
    .conv-group.collapsed .conv-group-body { display: none; }

    .conv-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.855rem;
      color: #adadad;
      transition: background 0.15s;
      gap: 8px;
    }
    .conv-item:hover { background: #2a2a2a; color: #ececec; }
    .conv-item.active { background: #2a2a2a; color: #ececec; }
    .conv-item-title {
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .conv-delete {
      opacity: 0;
      background: none;
      border: none;
      color: #8e8ea0;
      cursor: pointer;
      padding: 2px;
      border-radius: 4px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
    }
    .conv-item:hover .conv-delete { opacity: 1; }
    .conv-delete:hover { color: #f87171; background: #3a2a2a; }

    /* Main area */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 0;
      scroll-behavior: smooth;
    }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-thumb { background: #3a3a3a; border-radius: 3px; }

    .message {
      max-width: 720px;
      margin: 0 auto 8px;
      padding: 0 24px;
    }
    .message-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }
    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 600;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .avatar.user { background: #19c37d; color: #fff; }
    .avatar.ai { background: #444; color: #ececec; }

    .bubble {
      flex: 1;
      padding: 8px 0;
      line-height: 1.7;
      font-size: 0.95rem;
      white-space: pre-wrap;
      word-break: break-word;
      color: #ececec;
    }
    .bubble.error { color: #f87171; }

    /* Empty state */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: #8e8ea0;
    }
    .empty-state h2 {
      font-size: 1.6rem;
      font-weight: 600;
      color: #ececec;
    }
    .empty-state p { font-size: 0.9rem; }

    /* Input area */
    .input-area {
      padding: 12px 24px 20px;
      max-width: 768px;
      width: 100%;
      margin: 0 auto;
    }
    .input-box {
      background: #2f2f2f;
      border-radius: 16px;
      padding: 12px 16px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border: 1px solid #3a3a3a;
      transition: border-color 0.2s;
    }
    .input-box:focus-within { border-color: #555; }
    textarea {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #ececec;
      font-size: 0.95rem;
      font-family: inherit;
      resize: none;
      max-height: 200px;
      line-height: 1.6;
      padding: 2px 0;
    }
    textarea::placeholder { color: #6b6b6b; }
    .send-btn {
      width: 34px;
      height: 34px;
      background: #19c37d;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    .send-btn:hover { background: #15a367; }
    .send-btn:disabled { background: #3a3a3a; cursor: not-allowed; opacity: 0.6; }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 8px;
      color: #8e8ea0;
      font-size: 0.875rem;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
      margin-bottom: 2px;
    }
    .nav-link:hover { background: #2a2a2a; color: #ececec; }

    .sidebar-upload-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 8px 10px;
      background: none;
      border: 1px dashed #3a3a3a;
      border-radius: 8px;
      color: #8e8ea0;
      font-size: 0.8rem;
      cursor: pointer;
      margin-top: 8px;
      transition: border-color 0.15s, color 0.15s;
    }
    .sidebar-upload-btn:hover { border-color: #19c37d; color: #19c37d; }

    /* Upload result modal */
    .upload-modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .upload-modal.open { display: flex; }
    .upload-modal-box {
      background: #2a2a2a;
      border-radius: 12px;
      padding: 24px;
      width: 420px;
      max-width: 90vw;
    }
    .upload-modal-box h3 { font-size: 1rem; margin-bottom: 16px; color: #ececec; }
    .upload-result-img {
      width: 100%;
      max-height: 200px;
      object-fit: contain;
      border-radius: 8px;
      background: #1a1a1a;
      margin-bottom: 12px;
    }
    .upload-url-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .upload-url-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      color: #ececec;
      padding: 6px 10px;
      font-size: 0.78rem;
      outline: none;
    }
    .copy-btn {
      padding: 6px 14px;
      background: #19c37d;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 0.8rem;
      cursor: pointer;
      white-space: nowrap;
    }
    .copy-btn:hover { background: #15a367; }
    .upload-modal-close {
      margin-top: 16px;
      width: 100%;
      padding: 8px;
      background: #3a3a3a;
      border: none;
      border-radius: 6px;
      color: #ececec;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .upload-modal-close:hover { background: #444; }
    .upload-progress {
      text-align: center;
      color: #8e8ea0;
      font-size: 0.85rem;
      padding: 20px 0;
    }

    .hint {
      text-align: center;
      font-size: 0.75rem;
      color: #555;
      margin-top: 8px;
    }

    /* Thinking dots */
    .thinking {
      display: flex;
      gap: 4px;
      padding: 8px 0;
    }
    .thinking span {
      width: 6px;
      height: 6px;
      background: #8e8ea0;
      border-radius: 50%;
      animation: blink 1.2s infinite;
    }
    .thinking span:nth-child(2) { animation-delay: 0.2s; }
    .thinking span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: 0.2; }
      40% { opacity: 1; }
    }
  </style>
</head>
<body>

  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-title">MiniMax Chat</span>
      <button class="new-chat-btn" onclick="newChat()" title="新对话">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <div class="conv-list" id="conv-list"></div>
    <a class="nav-link" href="/photos.html">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>
      </svg>
      相册
    </a>
    <div style="flex:1"></div>
    <div class="user-info" id="user-email"></div>
    <button class="logout-btn" onclick="logout()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      退出登录
    </button>
  </div>

  <!-- Upload result modal -->
  <div class="upload-modal" id="upload-modal" onclick="closeUploadModal(event)">
    <div class="upload-modal-box">
      <h3>图片上传</h3>
      <div id="upload-modal-content"></div>
      <button class="upload-modal-close" onclick="closeUploadModal()">关闭</button>
    </div>
  </div>

  <!-- Main -->
  <div class="main">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty-state">
        <h2>有什么可以帮你的？</h2>
        <p>由 MiniMax-M2.5 驱动</p>
      </div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea
          id="prompt"
          placeholder="发送消息..."
          rows="1"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="sendPrompt()" disabled>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/>
          </svg>
        </button>
      </div>
      <div class="hint">Ctrl+Enter 发送</div>
    </div>
  </div>

  <script>
    const BACKEND_URL = "";

    // ── Auth ───────────────────────────────────────────
    const token = localStorage.getItem("token");
    if (!token) window.location.href = "/login.html";
    document.getElementById("user-email").textContent = localStorage.getItem("email") || "";

    function authHeaders() {
      return { "Authorization": `Bearer ${token}` };
    }

    function authFetch(url, opts = {}) {
      return fetch(url, {
        ...opts,
        headers: { ...authHeaders(), ...(opts.headers || {}) },
      }).then((res) => {
        if (res.status === 401) { logout(); }
        return res;
      });
    }

    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("email");
      window.location.href = "/login.html";
    }

    let currentConvId = null;
    let isLoading = false;

    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("send-btn");
    const messagesEl = document.getElementById("messages");
    const emptyState = document.getElementById("empty-state");
    const convList = document.getElementById("conv-list");

    // ── Init ──────────────────────────────────────────
    loadConversations();

    // ── Sidebar ───────────────────────────────────────
    async function loadConversations() {
      try {
        const res = await authFetch(`${BACKEND_URL}/api/conversations`);
        const convs = await res.json();
        renderConvList(convs);
      } catch {
        console.error("Failed to load conversations");
      }
    }

    // Track which groups are collapsed (persisted in sessionStorage)
    const collapsedGroups = new Set(
      JSON.parse(sessionStorage.getItem("collapsedGroups") || "[]")
    );

    function saveCollapsedGroups() {
      sessionStorage.setItem("collapsedGroups", JSON.stringify([...collapsedGroups]));
    }

    function groupConvs(convs) {
      const now = new Date();
      const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());
      const startOfYesterday = new Date(startOfToday - 86400000);
      const startOf7Days = new Date(startOfToday - 6 * 86400000);
      const startOf30Days = new Date(startOfToday - 29 * 86400000);

      const groups = [
        { key: "today",   label: "今天",      items: [] },
        { key: "yest",    label: "昨天",      items: [] },
        { key: "week",    label: "最近 7 天", items: [] },
        { key: "month",   label: "最近 30 天",items: [] },
        { key: "older",   label: "更早",      items: [] },
      ];

      convs.forEach((c) => {
        const d = new Date(c.updated_at || c.created_at);
        if (d >= startOfToday)       groups[0].items.push(c);
        else if (d >= startOfYesterday) groups[1].items.push(c);
        else if (d >= startOf7Days)  groups[2].items.push(c);
        else if (d >= startOf30Days) groups[3].items.push(c);
        else                         groups[4].items.push(c);
      });

      return groups.filter((g) => g.items.length > 0);
    }

    function makeConvItem(c) {
      const item = document.createElement("div");
      item.className = "conv-item" + (c.id === currentConvId ? " active" : "");
      item.dataset.id = c.id;
      item.innerHTML = `
        <span class="conv-item-title">${escHtml(c.title)}</span>
        <button class="conv-delete" onclick="deleteConv(event, '${c.id}')" title="删除">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
            <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
          </svg>
        </button>
      `;
      item.addEventListener("click", () => openConversation(c.id));
      return item;
    }

    function renderConvList(convs) {
      convList.innerHTML = "";
      const groups = groupConvs(convs);

      groups.forEach(({ key, label, items }) => {
        const group = document.createElement("div");
        group.className = "conv-group" + (collapsedGroups.has(key) ? " collapsed" : "");
        group.dataset.key = key;

        const header = document.createElement("div");
        header.className = "conv-group-header";
        header.innerHTML = `
          <span class="conv-group-label">${label}</span>
          <svg class="conv-group-arrow" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        `;
        header.addEventListener("click", () => {
          group.classList.toggle("collapsed");
          if (group.classList.contains("collapsed")) collapsedGroups.add(key);
          else collapsedGroups.delete(key);
          saveCollapsedGroups();
        });

        const body = document.createElement("div");
        body.className = "conv-group-body";
        items.forEach((c) => body.appendChild(makeConvItem(c)));

        group.appendChild(header);
        group.appendChild(body);
        convList.appendChild(group);
      });
    }

    async function openConversation(id) {
      currentConvId = id;
      document.querySelectorAll(".conv-item").forEach((el) => {
        el.classList.toggle("active", el.dataset.id === id);
      });
      clearMessages();

      try {
        const res = await authFetch(`${BACKEND_URL}/api/conversations/${id}/messages`);
        const msgs = await res.json();
        msgs.forEach((m) => appendMessage(m.role, m.content));
        messagesEl.scrollTop = messagesEl.scrollHeight;
      } catch {
        console.error("Failed to load messages");
      }
    }

    async function newChat() {
      try {
        const res = await authFetch(`${BACKEND_URL}/api/conversations`, { method: "POST" });
        const conv = await res.json();
        await loadConversations();
        currentConvId = conv.id;
        document.querySelectorAll(".conv-item").forEach((el) => {
          el.classList.toggle("active", el.dataset.id === conv.id);
        });
        clearMessages();
      } catch {
        console.error("Failed to create conversation");
      }
    }

    async function deleteConv(e, id) {
      e.stopPropagation();
      try {
        await authFetch(`${BACKEND_URL}/api/conversations/${id}`, { method: "DELETE" });
        if (currentConvId === id) {
          currentConvId = null;
          clearMessages();
        }
        await loadConversations();
      } catch {
        console.error("Failed to delete conversation");
      }
    }

    // ── Messages ──────────────────────────────────────
    function clearMessages() {
      messagesEl.innerHTML = "";
      messagesEl.appendChild(emptyState);
      emptyState.style.display = "flex";
    }

    function appendMessage(role, text = "") {
      emptyState.style.display = "none";
      const msg = document.createElement("div");
      msg.className = "message";
      msg.innerHTML = `
        <div class="message-row">
          <div class="avatar ${role}">${role === "user" ? "你" : "AI"}</div>
          <div class="bubble ${role}">${escHtml(text)}</div>
        </div>
      `;
      messagesEl.appendChild(msg);
      return msg.querySelector(".bubble");
    }

    function appendThinking() {
      emptyState.style.display = "none";
      const msg = document.createElement("div");
      msg.className = "message";
      msg.id = "thinking-msg";
      msg.innerHTML = `
        <div class="message-row">
          <div class="avatar ai">AI</div>
          <div class="thinking"><span></span><span></span><span></span></div>
        </div>
      `;
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;
      return msg;
    }

    // ── Image upload (standalone) ─────────────────────
    async function handleUpload(input) {
      const file = input.files[0];
      input.value = "";
      if (!file) return;

      const modal = document.getElementById("upload-modal");
      const content = document.getElementById("upload-modal-content");
      modal.classList.add("open");
      content.innerHTML = `<div class="upload-progress">上传中...</div>`;

      const formData = new FormData();
      formData.append("file", file);

      try {
        const res = await authFetch(`${BACKEND_URL}/api/upload`, { method: "POST", body: formData });
        if (!res.ok) throw new Error("Upload failed");
        const { url } = await res.json();
        content.innerHTML = `
          <img class="upload-result-img" src="${url}" alt="uploaded">
          <div class="upload-url-row">
            <input class="upload-url-input" id="upload-url-val" value="${url}" readonly>
            <button class="copy-btn" onclick="copyUrl()">复制链接</button>
          </div>
        `;
      } catch {
        content.innerHTML = `<div class="upload-progress" style="color:#e55;">上传失败，请重试</div>`;
      }
    }

    function copyUrl() {
      const input = document.getElementById("upload-url-val");
      navigator.clipboard.writeText(input.value).then(() => {
        const btn = document.querySelector(".copy-btn");
        btn.textContent = "已复制";
        setTimeout(() => { btn.textContent = "复制链接"; }, 2000);
      });
    }

    function closeUploadModal(e) {
      if (e && e.target !== document.getElementById("upload-modal")) return;
      document.getElementById("upload-modal").classList.remove("open");
    }

    // ── Send ──────────────────────────────────────────
    async function sendPrompt() {
      const prompt = promptEl.value.trim();
      if (!prompt || isLoading) return;

      // Auto-create conversation if none selected
      if (!currentConvId) {
        try {
          const res = await authFetch(`${BACKEND_URL}/api/conversations`, { method: "POST" });
          const conv = await res.json();
          currentConvId = conv.id;
          await loadConversations();
          document.querySelectorAll(".conv-item").forEach((el) => {
            el.classList.toggle("active", el.dataset.id === conv.id);
          });
        } catch {
          console.error("Failed to create conversation");
          return;
        }
      }

      isLoading = true;
      sendBtn.disabled = true;
      promptEl.value = "";
      promptEl.style.height = "auto";

      appendMessage("user", prompt);
      const thinking = appendThinking();

      try {
        const res = await authFetch(`${BACKEND_URL}/api/chat`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ prompt, conversationId: currentConvId }),
        });

        thinking.remove();
        const bubble = appendMessage("ai");
        bubble.textContent = "";

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const data = line.slice(6);
            if (data === "[DONE]") {
              await loadConversations(); // refresh title in sidebar
              break;
            }
            try {
              const parsed = JSON.parse(data);
              if (parsed.error) {
                bubble.classList.add("error");
                bubble.textContent = "错误：" + parsed.error;
              } else if (parsed.text) {
                bubble.textContent += parsed.text;
                messagesEl.scrollTop = messagesEl.scrollHeight;
              }
            } catch {}
          }
        }
      } catch {
        thinking.remove();
        const bubble = appendMessage("ai");
        bubble.classList.add("error");
        bubble.textContent = "连接失败，请检查后端是否启动。";
      }

      isLoading = false;
      sendBtn.disabled = promptEl.value.trim() === "";
    }

    // ── Utils ─────────────────────────────────────────
    function autoResize(el) {
      el.style.height = "auto";
      el.style.height = Math.min(el.scrollHeight, 200) + "px";
      sendBtn.disabled = el.value.trim() === "" || isLoading;
    }

    function escHtml(str) {
      return str.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    promptEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) sendPrompt();
    });
  </script>
</body>
</html>
